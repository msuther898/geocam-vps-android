name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Ensure stable debug keystore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f keystore/debug.keystore ]; then
            echo "Generating stable debug keystore (first run)…"
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=GeoCam VPS Debug, O=geocam, L=Hermosa Beach, S=CA, C=US"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add keystore/debug.keystore
            git commit -m "chore(ci): commit stable debug keystore for self-updater install compatibility"
            git push
            echo "Keystore committed; this build will use it."
          else
            echo "Stable debug keystore already present."
          fi

      - name: Inject Maps API key
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -z "$MAPS_API_KEY" ]; then
            echo "MAPS_API_KEY=MISSING_MAPS_API_KEY" > local.properties
            echo "::warning::Repo secret MAPS_API_KEY is missing; map tiles will not render."
          else
            echo "MAPS_API_KEY=$MAPS_API_KEY" > local.properties
          fi

      - name: Build debug APK
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: gradle :app:assembleDebug --stacktrace --info 2>&1 | tee build.log
        continue-on-error: false

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" -print -quit)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=geocam-vps-v0.1.${{ github.run_number }}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Rename APK for release
        run: |
          mkdir -p release-out
          cp "${{ steps.apk.outputs.path }}" "release-out/${{ steps.apk.outputs.name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: v0.1.${{ github.run_number }}
          body: |
            Auto-built debug APK for commit ${{ github.sha }}.

            Phase 1: map + ARCore dead-reckoning + IMU + self-updater.

            Install: download the APK below, allow "Install unknown apps" for your transfer app (Drive / Slack / Files), tap to install. After v0.1.0 the app updates itself in-place.
          files: release-out/*.apk
          fail_on_unmatched_files: true
