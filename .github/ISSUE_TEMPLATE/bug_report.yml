name: Bug report
description: Report a problem with the app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: App version
      description: From the Help screen (Version line)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device + Android version
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
  - type: textarea
    id: logs
    attributes:
      label: Logcat / screenshots
